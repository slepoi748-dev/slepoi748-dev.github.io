<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Phone</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:-apple-system,system-ui,sans-serif; background:#000; height:100vh;
         display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .screen { width:100%; max-width:420px; height:100vh; background:#111;
            color:#fff; position:relative; overflow:hidden; }

  .lock { position:absolute; inset:0; z-index:10;
          background:linear-gradient(160deg,#1e293b,#0f172a);
          display:flex; flex-direction:column; align-items:center;
          transition:transform .4s ease, opacity .4s ease; }
  .lock.hidden { transform:translateY(-100%); opacity:0; pointer-events:none; }
  .clock { margin-top:80px; font-size:72px; font-weight:300; }
  .date  { font-size:18px; opacity:.8; margin-top:4px; }

  .pin { margin-top:auto; margin-bottom:60px; text-align:center; }
  .dots { display:flex; gap:18px; justify-content:center; margin:18px 0; }
  .dot  { width:14px; height:14px; border-radius:50%; border:2px solid #fff; }
  .dot.on { background:#fff; }
  .pad  { display:grid; grid-template-columns:repeat(3,72px); gap:18px; }
  .key  { width:72px; height:72px; border-radius:50%; border:none;
          background:rgba(255,255,255,.15); color:#fff; font-size:28px; }
  .key:active { background:rgba(255,255,255,.35); }

  .home { padding:60px 20px; }
  .home h1 { font-weight:400; }
</style>
</head>
<body>
  <div class="screen">
    <div class="lock" id="lock">
      <div class="clock" id="clock">00:00</div>
      <div class="date"  id="date">—</div>
      <div class="pin">
        <div class="dots" id="dots"></div>
        <div class="pad" id="pad"></div>
      </div>
    </div>

    <div class="home">
      <h1>Готово ✅</h1>
      <p>Телефон разблокирован.</p>
    </div>
  </div>

<script>
  const PIN = "1234";              // ← правильный код
  let entered = "";

  const lock = document.getElementById('lock');
  const dots = document.getElementById('dots');
  const pad  = document.getElementById('pad');

  // часы
  function paint(){
    const n = new Date();
    document.getElementById('clock').textContent =
      String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
    document.getElementById('date').textContent =
      n.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
  }
  paint(); setInterval(paint, 10000);

  // точки
  function drawDots(){
    dots.innerHTML = '';
    for(let i=0;i<4;i++){
      const d = document.createElement('div');
      d.className = 'dot' + (i < entered.length ? ' on' : '');
      dots.appendChild(d);
    }
  }
  drawDots();

  // клавиши
  ['1','2','3','4','5','6','7','8','9','','0','⌫'].forEach(k=>{
    const b = document.createElement('button');
    b.className = 'key';
    b.textContent = k;
    if(k === '') { b.style.visibility='hidden'; }
    b.onclick = () => {
      if(k === '⌫') entered = entered.slice(0,-1);
      else if(k && entered.length < 4) entered += k;
      drawDots();
      if(entered.length === 4){
        setTimeout(()=>{
          if(entered === PIN) lock.classList.add('hidden');
          else { entered = ''; drawDots(); }   // неверно — сброс
        }, 150);
      }
    };
    pad.appendChild(b);
  });
</script>
</body>
</html>
